name: Deploy to Google Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  AR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'finagent-images' }}
  BACKEND_SERVICE: finagent-backend
  FRONTEND_SERVICE: finagent-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # For quick setup, use a service account JSON key stored in GitHub Secrets.
      # Recommended long-term: Workload Identity Federation.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com cloudbuild.googleapis.com artifactregistry.googleapis.com secretmanager.googleapis.com --project "$PROJECT_ID"

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "$AR_REPOSITORY" \
            --location "$REGION" \
            --project "$PROJECT_ID" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$AR_REPOSITORY" \
            --repository-format=docker \
            --location "$REGION" \
            --project "$PROJECT_ID"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build backend image
        run: |
          BACKEND_IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPOSITORY/$BACKEND_SERVICE:${GITHUB_SHA}"
          gcloud builds submit ./backend --tag "$BACKEND_IMAGE" --project "$PROJECT_ID"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy backend service
        run: |
          gcloud run deploy "$BACKEND_SERVICE" \
            --image "$BACKEND_IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "AGENT_APP_NAME=finagent,AGENT_MODEL=gemini-2.0-flash" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest,NEWS_API_KEY=NEWS_API_KEY:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest" \
            --timeout=300 \
            --project "$PROJECT_ID"

      - name: Get backend URL
        run: |
          BACKEND_URL=$(gcloud run services describe "$BACKEND_SERVICE" \
            --region "$REGION" \
            --format='value(status.url)' \
            --project "$PROJECT_ID")
          
          if [ -z "$BACKEND_URL" ]; then
            echo "Error: Backend URL is empty. Check if service exists."
            exit 1
          fi
          
          echo "Detected Backend URL: $BACKEND_URL"
          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"

      - name: Build frontend image
        run: |
          FRONTEND_IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPOSITORY/$FRONTEND_SERVICE:${GITHUB_SHA}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$BACKEND_URL" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            -t "$FRONTEND_IMAGE" ./frontend
          docker push "$FRONTEND_IMAGE"
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy frontend service
        run: |
          gcloud run deploy "$FRONTEND_SERVICE" \
            --image "$FRONTEND_IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --project "$PROJECT_ID"

      - name: Print deployed URLs
        run: |
          FRONTEND_URL=$(gcloud run services describe "$FRONTEND_SERVICE" --region "$REGION" --format='value(status.url)' --project "$PROJECT_ID")
          BACKEND_URL=$(gcloud run services describe "$BACKEND_SERVICE" --region "$REGION" --format='value(status.url)' --project "$PROJECT_ID")
          echo "Frontend URL: $FRONTEND_URL"
          echo "Backend URL:  $BACKEND_URL"
